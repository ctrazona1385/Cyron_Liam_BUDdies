<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B.U.D. Tracker — Create Compound</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <span class="brand">B.U.D. Tracker</span>
  <a href="dashboard.html">Dashboard</a>
  <a href="create-compound.html" class="active">New Compound</a>
  <a href="inventory.html">Inventory</a>
  <!-- Admin only -->
  <a href="admin-approval.html" class="admin-only" id="nav-admin">Approvals</a>
  <span class="nav-user" id="nav-user-name"></span>
  <button class="btn-logout" onclick="logout()">Logout</button>
</nav>

<div class="page">
  <h1 class="page-title">Create Compound</h1>

  <div id="form-alert" style="display:none;" class="alert"></div>

  <div class="card">
    <form id="compound-form" onsubmit="handleSubmit(event)">

      <h3 style="margin-bottom:1.1rem; color:var(--primary-dk);">Compound Info</h3>

      <div class="form-grid">
        <div class="form-group">
          <label for="comp-name">Compound Name</label>
          <input type="text" id="comp-name" placeholder="e.g. Hydrocortisone Cream 1%" required />
        </div>
        <div class="form-group">
          <label for="comp-strength">Strength</label>
          <input type="text" id="comp-strength" placeholder="e.g. 1%" required />
        </div>
        <div class="form-group">
          <label for="comp-lot">Lot Number</label>
          <input type="text" id="comp-lot" placeholder="e.g. LOT-20260101" required />
        </div>
        <div class="form-group">
          <label for="comp-qty">Quantity Made</label>
          <input type="number" id="comp-qty" placeholder="e.g. 30" min="1" required />
        </div>
        <div class="form-group">
          <label for="comp-unit">Unit</label>
          <select id="comp-unit" required>
            <option value="">— Select —</option>
            <option value="g">Grams (g)</option>
            <option value="mL">Milliliters (mL)</option>
            <option value="caps">Capsules</option>
            <option value="tabs">Tablets</option>
            <option value="units">Units</option>
          </select>
        </div>
        <div class="form-group">
          <label for="comp-type">Compound Type</label>
          <select id="comp-type" required>
            <option value="">— Select —</option>
            <option value="sterile">Sterile</option>
            <option value="non-sterile">Non-Sterile</option>
            <option value="hazardous">Hazardous</option>
          </select>
        </div>
        <div class="form-group span-2">
          <label for="comp-notes">Notes / Instructions</label>
          <textarea id="comp-notes" rows="3" placeholder="Special handling, storage conditions, etc."></textarea>
        </div>
      </div>

      <!-- ── B.U.D. Section ── -->
      <hr style="border:none; border-top:1px solid var(--border); margin:1.25rem 0;" />
      <h3 style="margin-bottom:1.1rem; color:var(--primary-dk);">Beyond-Use Date (B.U.D.)</h3>

      <div class="form-grid">
        <div class="form-group">
          <label for="comp-date-made">Date Compounded</label>
          <input type="date" id="comp-date-made" required />
        </div>
        <div class="form-group">
          <label for="comp-bud">Calculated B.U.D. <span style="font-weight:400;color:var(--muted)">(auto-filled)</span></label>
          <input type="date" id="comp-bud" readonly style="background:#f5f8fb;" />
        </div>
        <div class="form-group span-2">
          <label>
            <input type="checkbox" id="bud-override" onchange="toggleBudOverride()" />
            &nbsp;Admin override — manually set B.U.D.
          </label>
        </div>
        <div class="form-group" id="bud-manual-wrap" style="display:none;">
          <label for="comp-bud-manual">Manual B.U.D.</label>
          <input type="date" id="comp-bud-manual" />
        </div>
        <div class="form-group" id="bud-reason-wrap" style="display:none;">
          <label for="bud-reason">Override Reason</label>
          <input type="text" id="bud-reason" placeholder="Reason for manual override" />
        </div>
      </div>

      <!-- ── Ingredients ── -->
      <hr style="border:none; border-top:1px solid var(--border); margin:1.25rem 0;" />
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
        <h3 style="color:var(--primary-dk);">Ingredients (Drugs)</h3>
        <button type="button" class="btn btn-outline btn-sm" onclick="addIngredient()">+ Add Ingredient</button>
      </div>

      <div id="ingredients-list">
        <!-- Ingredient rows injected here -->
      </div>
      <p id="no-ingredients" style="color:var(--muted); font-size:.9rem;">No ingredients added yet.</p>

      <!-- ── Submit ── -->
      <hr style="border:none; border-top:1px solid var(--border); margin:1.25rem 0;" />
      <div style="display:flex; gap:.75rem; justify-content:flex-end;">
        <a href="inventory.html" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Submit for Approval</button>
      </div>

    </form>
  </div>
</div>

<script src="script.js"></script>
<script>
  // ── B.U.D. auto-calculation ──
  // USP <797> simplified defaults (days): non-sterile=180, sterile=30, hazardous=14
  const BUD_DEFAULTS = { sterile: 30, 'non-sterile': 180, hazardous: 14 };

  document.getElementById('comp-date-made').addEventListener('change', recalcBud);
  document.getElementById('comp-type').addEventListener('change', recalcBud);

  function recalcBud() {
    const dateMade = document.getElementById('comp-date-made').value;
    const type     = document.getElementById('comp-type').value;
    if (!dateMade || !type) return;
    const days = BUD_DEFAULTS[type] ?? 30;
    const bud  = new Date(dateMade);
    bud.setDate(bud.getDate() + days);
    document.getElementById('comp-bud').value = bud.toISOString().split('T')[0];
  }

  function toggleBudOverride() {
    const on = document.getElementById('bud-override').checked;
    document.getElementById('bud-manual-wrap').style.display = on ? '' : 'none';
    document.getElementById('bud-reason-wrap').style.display = on ? '' : 'none';
  }

  // ── Ingredients ──
  let ingredientCount = 0;

  function addIngredient() {
    document.getElementById('no-ingredients').style.display = 'none';
    ingredientCount++;
    const row = document.createElement('div');
    row.className = 'form-grid card';
    row.id = `ingredient-${ingredientCount}`;
    row.style.marginBottom = '.75rem';
    row.innerHTML = `
      <div class="form-group">
        <label>Drug Name</label>
        <input type="text" name="ing-drug-name" placeholder="e.g. Hydrocortisone" required />
      </div>
      <div class="form-group">
        <label>Strength / Concentration</label>
        <input type="text" name="ing-strength" placeholder="e.g. 100mg/mL" />
      </div>
      <div class="form-group">
        <label>Lot #</label>
        <input type="text" name="ing-lot" placeholder="Supplier lot number" />
      </div>
      <div class="form-group">
        <label>Expiration Date</label>
        <input type="date" name="ing-expiration" />
      </div>
      <div class="form-group span-2" style="display:flex; align-items:flex-end;">
        <button type="button" class="btn btn-danger btn-sm" onclick="removeIngredient(${ingredientCount})">Remove</button>
      </div>
    `;
    document.getElementById('ingredients-list').appendChild(row);
  }

  function removeIngredient(id) {
    document.getElementById(`ingredient-${id}`).remove();
    if (!document.querySelectorAll('#ingredients-list .card').length) {
      document.getElementById('no-ingredients').style.display = '';
    }
  }

  // ── Form submit ──
  function handleSubmit(e) {
    e.preventDefault();
    // TODO: gather form data, POST to /api/compounds
    // On success redirect to inventory.html with pending badge
    showFormAlert('Compound submitted for admin approval. (placeholder — backend not connected)', 'success');
  }

  function showFormAlert(msg, type = 'danger') {
    const el = document.getElementById('form-alert');
    el.textContent = msg;
    el.className = `alert alert-${type}`;
    el.style.display = '';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Set today as default date compounded
  document.getElementById('comp-date-made').valueAsDate = new Date();
  recalcBud();
</script>

</body>
</html>
